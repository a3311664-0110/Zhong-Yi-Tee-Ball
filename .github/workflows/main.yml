                      </li>
                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-zinc-500">
                        <Activity className="w-5 h-5 text-zinc-400 shrink-0 mt-0.5 mr-3" />
                        <div><span className="font-bold text-white">飛球接殺：</span> 接殺飛球觸發「死球狀態」，該打者直接出局。</div>
                      </li>
                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-zinc-500">
                        <Users className="w-5 h-5 text-zinc-400 shrink-0 mt-0.5 mr-3" />
                        <div><span className="font-bold text-white">觀眾規範：</span> 觀眾屬於球場「靜物」的一部分，絕對不得故意干擾比賽進行。</div>
                      </li>
                    </ul>
                    <div className="mt-6 border border-zinc-700 bg-black p-4 relative overflow-hidden">
                      <div className="absolute right-0 top-0 opacity-10 transform translate-x-4 -translate-y-4">
                          <Shield size={80} />
                      </div>
                      <h4 className="text-white font-bold mb-3 flex items-center text-sm"><XOctagon size={16} className="text-pink-500 mr-2"/> 死球狀態觸發時機</h4>
                      <div className="flex flex-wrap gap-2 text-xs font-bold relative z-10">
                          <span className="bg-zinc-800 border border-zinc-700 text-zinc-300 px-3 py-1 rounded-full">封殺跑者</span>
                          <span className="bg-zinc-800 border border-zinc-700 text-zinc-300 px-3 py-1 rounded-full">接殺飛球</span>
                          <span className="bg-zinc-800 border border-zinc-700 text-zinc-300 px-3 py-1 rounded-full">高年級內野手傳回投手/本壘</span>
                      </div>
                    </div>
                  </Card>
                </div>
              </div>
            </section>

            <section>
