        {badge}
      </div>
      <h3 className="text-2xl font-black text-white mt-4 mb-6 tracking-wider relative z-10">
        {grade}
      </h3>
      {illustration && (
        <div className="relative z-10 w-full transform scale-105 origin-left">
          {illustration}
        </div>
      )}
      {battingChart && (
        <div className="relative z-10 w-full transform scale-105 origin-left mt-2">
          {battingChart}
        </div>
      )}
    </div>

    <div className="md:w-3/5 p-6 md:p-8 flex items-center bg-zinc-900">
      <ul className="space-y-4 text-zinc-300 text-base w-full">
        {rules.map((rule, idx) => {
          const isHighlight = rule.includes('打線') || rule.includes('防守') || rule.includes('殘壘延續');
          return (
            <li key={idx} className={`flex items-start ${isHighlight ? 'bg-zinc-800/80 p-4 rounded-lg border-l-4 border-pink-500 text-white font-bold shadow-md transform hover:scale-[1.01] transition-transform' : 'p-2'}`}>
              {!isHighlight && <span className="w-1.5 h-1.5 rounded-full bg-pink-500 mt-2 mr-3 shrink-0"></span>}
              <span className={`leading-relaxed tracking-wide ${isHighlight ? 'ml-1' : ''}`}>
                {rule.split('：').map((part, i, arr) => (
                  <React.Fragment key={i}>
                    {i === 0 && arr.length > 1 ? <span className="text-pink-400 font-black mr-1">{part}：</span> : part}
                  </React.Fragment>
                ))}
              </span>
            </li>
          );
        })}
      </ul>
    </div>
  </div>
);

const ScheduleItem = ({ matchInfo }) => {
  const { date, time, match, teamA, teamB, scoreA, scoreB, status } = matchInfo;
  const isCompleted = status === 'completed';
  const scoreNumA = parseInt(scoreA);
  const scoreNumB = parseInt(scoreB);
  
  // 處理和局邏輯 (Tie handling)
  const isTie = isCompleted && scoreNumA === scoreNumB;
  const aWon = isCompleted && scoreNumA > scoreNumB;
  const bWon = isCompleted && scoreNumB > scoreNumA;

  return (
    <li className={`flex flex-col sm:flex-row sm:items-center justify-between bg-black p-4 border transition-all duration-300 group cursor-default relative overflow-hidden ${isCompleted ? 'border-pink-500/30' : 'border-zinc-800 hover:border-pink-500/50'}`}>
      <div className="flex items-center space-x-3 mb-3 sm:mb-0 relative z-10">
        <div className={`px-2 py-1 font-mono font-bold border-l-2 text-xs sm:text-sm transition-colors ${isCompleted ? 'bg-pink-600 text-white border-pink-400' : 'bg-zinc-900 text-zinc-300 border-pink-500 group-hover:bg-pink-600 group-hover:text-white'}`}>
          {date}
        </div>
        <div className="text-zinc-500 font-mono text-xs sm:text-sm">{time}</div>
        <div className="text-pink-500 font-bold text-[10px] sm:text-xs border border-pink-500/30 px-2 py-0.5 rounded-sm uppercase tracking-wider">{match}</div>
      </div>
      <div className={`flex items-center space-x-4 px-4 py-2 rounded-sm border transition-colors relative z-10 ${isCompleted ? 'bg-zinc-900/80 border-zinc-700' : 'bg-zinc-900/50 border-zinc-800/50 group-hover:border-pink-500/30'}`}>
        <span className={`w-10 text-right font-black text-lg sm:text-xl tracking-wider ${aWon ? 'text-pink-400' : (isTie ? 'text-zinc-300' : 'text-white')}`}>{teamA}</span>
        
        {isCompleted ? (
           <div className="flex items-center space-x-2 font-black text-xl">
             <span className={aWon ? 'text-pink-400' : (isTie ? 'text-zinc-400' : 'text-white')}>{scoreA}</span>
             <span className="text-zinc-600 text-sm pb-1">-</span>
             <span className={bWon ? 'text-pink-400' : (isTie ? 'text-zinc-400' : 'text-white')}>{scoreB}</span>
           </div>
        ) : (
           <span className="text-zinc-600 text-xs font-black italic uppercase mx-2">vs</span>
        )}
        
        <span className={`w-10 text-left font-black text-lg sm:text-xl tracking-wider ${bWon ? 'text-pink-400' : (isTie ? 'text-zinc-300' : 'text-white')}`}>{teamB}</span>
      </div>
      
      {isCompleted && !isTie && <div className="absolute inset-0 bg-gradient-to-r from-transparent via-pink-500/5 to-transparent opacity-50"></div>}
      {isTie && <div className="absolute inset-0 bg-gradient-to-r from-transparent via-zinc-500/10 to-transparent opacity-50"></div>}
    </li>
  );
};

const ChecklistItem = ({ title, desc, icon, isChecked, onClick }) => {
  return (
    <div 
      className="flex items-start space-x-4 group cursor-pointer transition-all duration-300 p-2 rounded-lg hover:bg-zinc-800/30"
      onClick={onClick}
    >
      <div className="mt-1 shrink-0">
        <div className={`w-10 h-10 border-2 rounded-md flex items-center justify-center transition-all duration-300 transform ${isChecked ? 'bg-pink-500 border-pink-500 scale-110' : 'border-zinc-600 group-hover:border-pink-500 group-hover:bg-pink-500/10'}`}>
          <div className={`transition-colors duration-300 ${isChecked ? 'text-white' : 'text-zinc-500 group-hover:text-pink-500'}`}>
              {isChecked ? <CheckSquare size={20} /> : (icon || <CheckSquare size={16} />)}
          </div>
        </div>
      </div>
      <div className={`transition-all duration-500 ${isChecked ? 'opacity-40' : 'opacity-100'}`}>
        <h4 className={`text-xl font-black mb-1 uppercase tracking-wide transition-all duration-300 ${isChecked ? 'text-zinc-500 line-through decoration-pink-500 decoration-2' : 'text-white group-hover:text-pink-400'}`}>
          {title}
        </h4>
        <div className="text-zinc-400 leading-relaxed text-sm md:text-base">
          {desc}
        </div>
      </div>
    </div>
  );
};

const BattingOrderChart = ({ type }) => {
