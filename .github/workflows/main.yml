                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-pink-500/50">
                        <XOctagon className="w-5 h-5 text-pink-500 shrink-0 mt-0.5 mr-3" />
                        <div><span className="font-bold text-white">妨礙守備：</span> 故意妨礙，或為閃躲防守者嚴重偏離路線（超過1公尺）即判定出局。</div>
                      </li>
                    </ul>
                    <div className="mt-6 bg-red-900/30 border border-red-500/50 p-4 rounded-none">
                      <div className="flex items-center text-red-400 font-bold mb-2">
                        <AlertTriangle size={20} className="mr-2 animate-pulse" /> 嚴禁滑壘或撲壘！
                      </div>
                      <p className="text-sm text-red-200">跑者使用滑或撲等危險動作，不論有意無意、上壘與否，一律判定出局！</p>
                    </div>
                  </Card>

                  <Card title="防守底線與死球狀態" type="normal" icon={<Shield className="w-6 h-6 text-pink-500 mr-2" />}>
                    <ul className="space-y-4 text-zinc-300">
                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-zinc-500">
                        <Shield className="w-5 h-5 text-zinc-400 shrink-0 mt-0.5 mr-3" />
