  return (
    <div className="mt-6 bg-black border border-zinc-700 rounded-md overflow-hidden shadow-inner">
      <div className="bg-zinc-800/80 text-xs font-bold text-center py-1.5 text-pink-400 tracking-widest border-b border-zinc-700">
        棒次安排圖解 ({isContinuous ? '接續打擊制' : '循環打擊制'})
      </div>
      <div className="flex divide-x divide-zinc-700 text-center">
        <div className="flex-1 p-3">
          <div className="text-[10px] text-zinc-500 mb-1 font-black tracking-widest">第一局攻擊</div>
          <div className="font-mono text-sm text-white font-bold bg-zinc-900 py-1 rounded border border-zinc-800">1 ~ N 棒</div>
        </div>
        <div className="flex-1 p-3">
          <div className="text-[10px] text-zinc-500 mb-1 font-black tracking-widest">第二局攻擊</div>
          <div className="font-mono text-[13px] text-pink-400 font-bold bg-zinc-900 py-1 rounded border border-pink-500/30">
            {isContinuous ? '(N+1)棒 起接續' : '1 ~ N 棒(重複)'}
          </div>
        </div>
      </div>
      <div className="bg-zinc-900/50 p-2 text-[10px] text-zinc-400 text-center border-t border-zinc-700/50">
         {isContinuous ? '⚠️ 上下半局打擊人員絕對不可重複' : '⚠️ 循環打擊制：上下半局打線完全相同'}
      </div>
    </div>
  );
};

const ScoringIllustration = ({ type }) => {
  if (type === 'middle') {
    return (
      <div className="bg-black border border-zinc-800 p-4 rounded-md">
        <h4 className="text-xs font-bold text-pink-500 mb-3 flex items-center"><Zap size={14} className="mr-1"/> 推進得分機制 (跑幾個壘包得幾分)</h4>
