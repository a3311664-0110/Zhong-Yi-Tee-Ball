    { id: 'g3-2', grade: '3', gradeName: '三年級', date: '4/22 (三)', time: '08:10', match: '場次二', teamA: '301', teamB: '303', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g3-3', grade: '3', gradeName: '三年級', date: '4/23 (四)', time: '08:10', match: '場次三', teamA: '302', teamB: '303', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g4-1', grade: '4', gradeName: '四年級', date: '4/21 (二)', time: '08:10', match: '場次一', teamA: '401', teamB: '402', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g4-2', grade: '4', gradeName: '四年級', date: '4/22 (三)', time: '08:10', match: '場次二', teamA: '401', teamB: '403', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g4-3', grade: '4', gradeName: '四年級', date: '4/23 (四)', time: '08:10', match: '場次三', teamA: '402', teamB: '403', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g5-1', grade: '5', gradeName: '五年級', date: '4/27 (一)', time: '08:10', match: '場次一', teamA: '501', teamB: '502', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g5-2', grade: '5', gradeName: '五年級', date: '4/28 (二)', time: '08:10', match: '場次二', teamA: '501', teamB: '503', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g5-3', grade: '5', gradeName: '五年級', date: '4/30 (四)', time: '08:10', match: '場次三', teamA: '502', teamB: '503', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g6-1', grade: '6', gradeName: '六年級', date: '4/27 (一)', time: '08:10', match: '場次一', teamA: '601', teamB: '602', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g6-2', grade: '6', gradeName: '六年級', date: '4/28 (二)', time: '08:10', match: '場次二', teamA: '601', teamB: '603', scoreA: '', scoreB: '', status: 'pending' },
    { id: 'g6-3', grade: '6', gradeName: '六年級', date: '4/30 (四)', time: '08:10', match: '場次三', teamA: '602', teamB: '603', scoreA: '', scoreB: '', status: 'pending' },
  ];
  const [matchData, setMatchData] = useState(initialMatches);

  const updateMatchScore = (id, scoreA, scoreB) => {
    setMatchData(prev => prev.map(m => m.id === id ? { ...m, scoreA, scoreB, status: 'completed' } : m));
    showToast('賽事比分已登錄與發佈！');
  };

  const resetMatchScore = (id) => {
    if (window.confirm('確定要刪除並重設這筆比分紀錄嗎？')) {
      setMatchData(prev => prev.map(m => m.id === id ? { ...m, scoreA: '', scoreB: '', status: 'pending' } : m));
      showToast('比分紀錄已刪除');
    }
  };

  // 打線管理狀態 - 長度維持最高 30 棒
  const [selectedGrade, setSelectedGrade] = useState('');
  const [selectedClass, setSelectedClass] = useState('');
  const [lineupData, setLineupData] = useState(Array.from({ length: 30 }, () => ({ number: '', name: '' })));
  const [lastUpdated, setLastUpdated] = useState(null);
  
  // 安全與解鎖狀態
  const [isUnlocked, setIsUnlocked] = useState(false);
  const [passcodeInput, setPasscodeInput] = useState('');
  const [authError, setAuthError] = useState(false);

  const [isAdminUnlocked, setIsAdminUnlocked] = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [adminPasscodeInput, setAdminPasscodeInput] = useState('');
  const [adminAuthError, setAdminAuthError] = useState(false);

  const resetLineupData = () => {
    setLineupData(Array.from({ length: 30 }, () => ({ number: '', name: '' })));
    setLastUpdated(null);
    setIsUnlocked(false);
    setPasscodeInput('');
    setAuthError(false);
  };

  const handleUnlock = (e) => {
    e.preventDefault();
    const classPasscodes = {
      '301': '301111', '302': '302222', '303': '303333',
      '401': '401111', '402': '402222', '403': '403333',
      '501': '501111', '502': '502222', '503': '503333',
      '601': '601111', '602': '602222', '603': '603333'
    };

    if (passcodeInput === classPasscodes[selectedClass]) {
      setIsUnlocked(true);
      setAuthError(false);
      showToast(`${selectedClass} 班打線編輯權限已解鎖`);
    } else {
      setAuthError(true);
      setTimeout(() => setAuthError(false), 500);
    }
  };

  const handleAdminUnlock = (e) => {
    e.preventDefault();
    if (adminPasscodeInput === '840110') {
      setIsAdminUnlocked(true);
      setShowAdminLogin(false);
      setAdminAuthError(false);
      setAdminPasscodeInput('');
      showToast('體衛組長權限已解鎖，可新增成績與賽程');
    } else {
      setAdminAuthError(true);
      setTimeout(() => setAdminAuthError(false), 500);
    }
  };

  const getGradeAlert = () => {
    switch(selectedGrade) {
      case '3': return { text: "每半局 12-13 人打擊（下半局不重複）。兩局共計 24-26 棒次。", limit: 26 };
      case '4': return { text: "每半局 10-12 人打擊（下半局不重複）。兩局共計 20-24 棒次。", limit: 24 };
      case '5': return { text: "每半局 13-14 人打擊（下半局不重複）。防守須由當局攻擊者選派 9 人。", limit: 30 };
      case '6': return { text: "每半局 16-18 人打擊。循環打擊制（每人打兩次，上下半局打線完全相同）。", limit: 19 };
      default: return { text: "請先選擇年級以查看排棒限制。", limit: 19 };
    }
  };

  const handleFileUpload = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    setIsUploading(true);
    setTimeout(() => {
      const newFile = {
        id: Date.now(),
        name: file.name,
        date: new Date().toISOString().split('T')[0],
        type: file.type || 'application/pdf'
      };
      setUploadedFiles([newFile, ...uploadedFiles]);
      setIsUploading(false);
      showToast('成績檔案已成功上傳與發佈');
    }, 1000);
  };

  // MIT 優化: 跨平台 CSV 解析與邊界防護
  const handleCsvImport = (event) => {
    const file = event.target.files[0];
    if (!file) return;
    setIsUploading(true);

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        // 處理 Mac/Win 不同斷行，過濾空行
        const rows = text.split(/\r?\n/).filter(row => row.trim().length > 0).map(row => row.split(','));
        const limit = getGradeAlert().limit;
        const newD = [];

        // 索引 1 開始 (跳過 Header)
        for (let i = 1; i <= limit; i++) {
          if (rows[i]) {
             newD.push({
               number: rows[i][1]?.trim() || '',
               name: rows[i][2]?.trim() || ''
             });
          } else {
             newD.push({ number: '', name: '' });
          }
        }
        
        // 補齊 30 棒次記憶體空間
        const paddedLineup = Array.from({ length: 30 }, (_, i) => newD[i] || { number: '', name: '' });
        
        setLineupData(paddedLineup);
        const now = new Date();
        setLastUpdated(now.toLocaleString('zh-TW', { hour12: false }));
        setIsUploading(false);
        showToast(`已成功精準匯入 ${selectedClass} 班打線名單`);
      } catch (error) {
        setIsUploading(false);
        showToast('CSV 檔案解析失敗，請確認格式是否正確');
      }
    };
    reader.readAsText(file);
    event.target.value = null;
  };

  const handleDownloadTemplate = () => {
    if (!selectedGrade) {
      showToast('請先選擇年級，以產生對應人數的範本！');
      return;
    }
    const limit = getGradeAlert().limit;
    const BOM = '\uFEFF';
    let csvContent = BOM + "棒次,座號,選手姓名\n";
    
    for (let i = 1; i <= limit; i++) {
      if(i === 1) {
        csvContent += `${i},1,王小明\n`;
      } else {
        csvContent += `${i},,\n`;
      }
    }

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `忠義國小_${selectedGrade}年級_打線範本.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showToast(`已下載 ${selectedGrade} 年級 CSV 範本 (支援至 ${limit} 棒)`);
  };

