                    <ul className="space-y-4 text-zinc-300">
                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-pink-500/50">
                        <Target className="w-5 h-5 text-pink-500 shrink-0 mt-0.5 mr-3" />
                        <div><span className="font-bold text-white">1好球：</span> 揮棒落空、界外球、或滾地球未出5公尺線。<br/><span className="text-pink-400 font-bold">累計3好球即出局。</span></div>
                      </li>
                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-pink-500/50">
                        <MapPin className="w-5 h-5 text-pink-500 shrink-0 mt-0.5 mr-3" />
                        <div><span className="font-bold text-white">壘包識別：</span> <span className="bg-white text-black px-1 font-bold">白色</span>為防守壘包；<span className="bg-orange-500 text-white px-1 font-bold">橘色</span>為跑壘壘包。</div>
                      </li>
                      <li className="flex items-start bg-zinc-800/30 p-3 rounded-md border-l-2 border-pink-500/50">
